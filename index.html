<!DOCTYPE html>
<html>
<head>
  <title>Online Exam System</title>
  <style>
    body { font-family: Arial; padding:20px; }
    .hidden { display:none; }
  </style>
</head>

<body>

<h2>Online Exam System</h2>

<div id="auth">
  <h3>Signup / Login</h3>
  Email: <input type="email" id="email"><br><br>
  Password: <input type="password" id="password"><br><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="exam" class="hidden"></div>
<div id="result" class="hidden"></div>

<!-- ✅ Firebase v10 (MODULAR) -->
<script type="module">

// 🔥 IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAvszsSiIh6ShxHmG6eX1UDdfkdr7DQzz4",
  authDomain: "onlineexamsystem-498ac.firebaseapp.com",
  projectId: "onlineexamsystem-498ac",
  storageBucket: "onlineexamsystem-498ac.firebasestorage.app",
  messagingSenderId: "935013759428",
  appId: "1:935013759428:web:32c78857fc672275a8cc91",
  measurementId: "G-Q3XXT9KT4W"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// -------- AUTH --------
window.signup = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  try{
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Signup Success");
  }catch(e){
    alert(e.message);
  }
}

window.login = async function(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    startExam();
  }catch(e){
    alert(e.message);
  }
}

// -------- QUESTIONS --------
let baseQ = [
{q:"2+2=?", o:["3","4","5","6"], a:"4"},
{q:"5×6=?", o:["20","25","30","35"], a:"30"},
{q:"Capital of India?", o:["Mumbai","Delhi","Pune","Goa"], a:"Delhi"}
];

let questions=[];
while(questions.length<100) questions=questions.concat(baseQ);
questions=questions.slice(0,100);

let selectedQ=[];

// -------- EXAM --------
window.startExam = function(){
  document.getElementById("auth").style.display="none";

  questions.sort(()=>0.5-Math.random());
  selectedQ=questions.slice(0,25);

  let html="";
  selectedQ.forEach((q,i)=>{
    html+=`<p>${i+1}. ${q.q}</p>`;
    q.o.forEach(opt=>{
      html+=`<input type="radio" name="q${i}" value="${opt}">${opt}<br>`;
    });
  });

  html+=`<br><button onclick="submitExam()">Submit</button>`;
  document.getElementById("exam").innerHTML=html;
  document.getElementById("exam").classList.remove("hidden");
}

// -------- RESULT --------
window.submitExam = async function(){
  let score=0;

  selectedQ.forEach((q,i)=>{
    let ans=document.querySelector(`input[name=q${i}]:checked`);
    if(ans && ans.value===q.a) score++;
  });

  let percent=((score/25)*100).toFixed(2);
  let user=auth.currentUser.email;

  // 🔥 SAVE TO FIRESTORE
  await addDoc(collection(db,"results"),{
    email:user,
    score:score,
    percentage:percent,
    time:new Date()
  });

  document.getElementById("exam").classList.add("hidden");
  document.getElementById("result").innerHTML=
    `<h2>Score: ${score}/25</h2>
     <h3>${percent}%</h3>`;
  document.getElementById("result").classList.remove("hidden");
}

</script>

</body>
</html>
